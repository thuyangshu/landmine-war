<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>地雷战 - 保卫村庄</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-panel">
            <div id="resources">
                <span class="res" id="res-iron">🔩 铁: <b>30</b></span>
                <span class="res" id="res-powder">💥 火药: <b>50</b></span>
                <span class="res" id="lives-info">🏠 <b>5</b>/5</span>
            </div>
            <div id="mine-selector">
                <!-- JS builds -->
            </div>
            <div id="game-info">
                <div id="detail-panel">
                    <div id="level-info">第<b>1</b>关 黄土岭</div>
                    <div id="wave-info">第<b>1</b>/3波</div>
                    <div id="wave-preview"></div>
                    <button id="help-btn">❓</button>
                    <button id="mute-btn">🔊</button>
                    <button id="detail-quit" onclick="location.reload()">退出游戏</button>
                </div>
                <button id="more-btn">⋯</button>
                <button id="speed-btn" class="hidden">⏩</button>
            </div>
        </div>
    </div>
    <button id="menu-btn" class="hidden">☰</button>
    <div id="menu-overlay" class="hidden">
        <div id="menu-box">
            <button id="menu-restart">重玩本关</button>
            <button id="menu-quit">退出游戏</button>
            <button id="menu-close">返回</button>
        </div>
    </div>
    <div id="message-overlay" class="hidden">
        <div id="message-box">
            <h2 id="msg-title"></h2>
            <p id="msg-text"></p>
            <button id="msg-btn">继续</button>
            <div id="msg-exit" onclick="location.reload()">退出游戏</div>
        </div>
    </div>
    <script src="js/audio.js"></script>
    <script src="js/config.js"></script>
    <script src="js/game.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
